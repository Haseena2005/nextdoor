<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join as Professional – NEXTDOOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:var(--beige);">

<nav class="navbar">
  <div class="nav-container">
    <div class="logo" onclick="location.href='index.html'">NEXT<span>DOOR</span></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="customer.html">Explore Services</a></li>
      <li><a href="customer_register.html" style="color:var(--secondary);">Customer Sign Up</a></li>
    </ul>
    <div class="hamburger" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  </div>
</nav>

<div class="container py-5">
  <div class="max-600" style="background:white;border-radius:28px;border:1.5px solid var(--border);padding:52px;box-shadow:0 24px 60px rgba(30,58,138,0.08);">

    <div class="text-center mb-5">
      <h1 style="font-size:2.4rem;margin-bottom:8px;">Join as Professional</h1>
  <p class="text-muted" style="font-size:1.05rem;font-weight:600;">Showcase your skills, find local jobs, and grow your professional brand.</p>
    </div>

    <form onsubmit="event.preventDefault();alert('Registration Successful! Welcome to NEXTDOOR!');location.href='professional_dashboard.html';">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Primary Skill / Craft</label>
        <select class="form-control" required>
          <option value="">Select your specialty</option>
          <option>Pottery / Ceramics</option>
          <option>Mehendi Artist</option>
          <option>Electrician</option>
          <option>Plumber</option>
          <option>Tailor</option>
          <option>Weaver / Handloom</option>
          <option>Mandala Artist</option>
          <option>Painter</option>
          <option>Folk Artist</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter your email address" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" placeholder="Enter your phone number" required>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" class="form-control" placeholder="Enter your location (City, State)" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" minlength="8" required>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <label class="flex-start" style="gap:10px;cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--muted);">
          <input type="checkbox" required>
          I agree to the <a href="#" style="color:var(--secondary);">Professional Terms of Service</a>.
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="padding:18px;font-size:1.05rem;">Create Professional Account</button>
    </form>

    <p class="text-center mt-4" style="font-size:0.9rem;font-weight:600;color:var(--muted);">Already have an account? <a href="#" style="color:var(--secondary);">Login</a></p>
  </div>
</div>

<footer>
  <div class="container text-center">
    <div class="footer-logo">NEXT<span>DOOR</span></div>
    <p style="color:#64748b;font-size:0.85rem;">&copy; 2026 NEXTDOOR.</p>
  </div>
</footer>
<script src="js/script.js"></script>
</body>
</html>
